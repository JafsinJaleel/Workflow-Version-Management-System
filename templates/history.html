<!DOCTYPE html>
<html>
<head>
    <title>Workflow History</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
<div class="container">
    <h2>Workflow Version History</h2>
    <form method="POST" action="/compare/{{workflow_id}}">
        <table>
            <tr>
                <th>Version 1</th>
                <th>Version 2</th>
                <th>Version Number</th>
                <th>Stages</th>
                <th>Date</th>
            </tr>
            {% for v in versions %}
            <tr>
                <td><input type="radio" name="version1" value="{{v.version}}" required></td>
                <td><input type="radio" name="version2" value="{{v.version}}" required></td>
                <td>{{v.version}}</td>
                <td>{{v.stages}}</td>
                <td>{{v.date}}</td>
            </tr>
            {% endfor %}
        </table>
        <br>
        <button type="submit">Compare Versions</button>
    </form>
</div>
</body>
</html>
